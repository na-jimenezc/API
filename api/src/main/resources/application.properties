
##PRODUCCIÓN
#---
spring.config.activate.on-profile=default
spring.application.name=api

#Configuración H2 

##RECORDAR PONER : jdbc:h2:file:./data/animalheartdb EN LA URL DE LA INTERFÁZ DEL H2
spring.datasource.url=jdbc:h2:file:./data/animalheartdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#Para que siempre borre y cree las tablas al iniciar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

#Mostrar SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#H2 Console habilitada
spring.h2.console.enabled=true
# http://localhost:8080/h2
spring.h2.console.path=/h2


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.level.org.springframework.data.jpa=DEBUG

logging.level.org.springframework.transaction=DEBUG

#---
spring.config.activate.on-profile=test
spring.application.name=api-test

#Configuración H2 
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.com.api.api=DEBUG

server.port=8080
