
# Configuración común para todos los perfiles
spring.application.name=api
server.port=8080

# Configuración de correo Gmail (común para todos los perfiles)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=evolvxmovil@gmail.com
spring.mail.password=oekucoghrbuheepr
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.mime.charset=UTF-8
spring.mail.properties.mail.smtp.allow8bitmime=true

# Correo del administrador
app.admin.email=evolvxmovil@gmail.com

# Configuración H2 para producción (perfil por defecto)
spring.datasource.url=jdbc:h2:file:./data/animalheartdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

# Mostrar SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console habilitada
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG